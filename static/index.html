<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU 集群管理</title>
<meta name="description" content="GPU 集群管理平台 — 选择服务器，注册或登录，一键进入">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f3f2f1;
  --surface:#ffffff;
  --surface2:#faf9f8;
  --border:#edebe9;
  --border-hl:#0078d4;
  --text:#323130;
  --muted:#605e5c;
  --accent:#0078d4;
  --accent-light:#eff6fc;
  --accent-hover:#106ebe;
  --green:#107c10;
  --green-bg:#dff6dd;
  --red:#d13438;
  --red-bg:#fde7e9;
  --radius:4px;
  --transition:.15s ease;
  --shadow:0 1.6px 3.6px rgba(0,0,0,.13),0 .3px .9px rgba(0,0,0,.1);
}
html{height:100%}
body{
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:14px}
input{font-family:inherit}

/* ── Auth Page ─────────────────────────────── */
#auth-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:var(--bg);
}
.auth-shell{
  width:min(1060px,100%);
  display:grid;
  grid-template-columns:1.1fr .9fr;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}

/* ── Left Side ─────────────────────────────── */
.auth-side{
  padding:36px 32px 32px;
  background:var(--surface2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}
.auth-side h1{
  font-size:24px;font-weight:600;color:var(--text);
  margin-bottom:8px;
}
.auth-side .subtitle{
  color:var(--muted);margin-bottom:24px;font-size:14px;
}
.steps-bar{
  display:flex;align-items:center;gap:0;
  padding:12px 16px;
  background:var(--accent-light);
  border:1px solid #c7e0f4;
  border-radius:var(--radius);
  margin-bottom:24px;
  font-size:13px;color:var(--accent);font-weight:500;
}
.steps-bar .step{display:flex;align-items:center;gap:6px}
.steps-bar .arrow{margin:0 10px;opacity:.5;font-size:11px;color:var(--muted)}
.step-num{
  width:22px;height:22px;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;
}

.section-label{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.section-label h2{font-size:14px;font-weight:600;color:var(--text)}
.section-label .tip{color:var(--muted);font-size:12px}

.node-list{
  display:grid;gap:8px;
  flex:1;overflow-y:auto;
  max-height:340px;
  padding-right:4px;
}
.node-list::-webkit-scrollbar{width:4px}
.node-list::-webkit-scrollbar-thumb{background:#c8c6c4;border-radius:4px}

.node-card{
  display:block;width:100%;text-align:left;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
  color:var(--text);
  transition:all var(--transition);
}
.node-card:hover{
  border-color:#c8c6c4;
  background:#faf9f8;
}
.node-card.selected{
  border-color:var(--accent);
  background:var(--accent-light);
  box-shadow:inset 3px 0 0 var(--accent);
}
.node-card.offline{opacity:.55}
.node-card-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:4px;
}
.node-name{font-weight:600;font-size:14px;color:var(--text)}
.node-meta{color:var(--muted);font-size:12px;margin-top:1px}
.node-status{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;white-space:nowrap;color:var(--muted);
}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.online{background:var(--green)}
.dot.offline{background:#a19f9d}
.node-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:2px;font-size:11px;font-weight:500;
  border:1px solid var(--border);
  color:var(--muted);background:var(--surface2);
}
.tag.primary{
  border-color:#c7e0f4;
  color:var(--accent);
  background:var(--accent-light);
}

/* ── Right Side (Auth Form) ──────────────── */
.auth-main{
  padding:36px 32px 32px;
  display:flex;flex-direction:column;
}
.tabs{
  display:inline-flex;
  border-bottom:2px solid var(--border);
  margin-bottom:22px;
  align-self:flex-start;
  gap:0;
}
.tab{
  min-width:80px;padding:8px 16px;
  border-radius:0;background:transparent;
  color:var(--muted);font-weight:500;font-size:14px;
  transition:all var(--transition);
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

.auth-panel-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px}
.auth-panel-subtitle{color:var(--muted);font-size:13px;margin-bottom:18px}

.selected-node-box{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:10px 14px;
  border:1px solid #c7e0f4;
  border-radius:var(--radius);
  background:var(--accent-light);
  margin-bottom:20px;
}
.selected-node-text strong{color:var(--text);font-size:14px}
.selected-node-text div{color:var(--muted);font-size:12px;margin-top:2px}

.stack{display:grid;gap:14px}
.hidden{display:none!important}
.field label{
  display:block;margin-bottom:4px;
  color:var(--text);font-size:14px;font-weight:600;
}
.field input{
  width:100%;padding:7px 12px;
  border:1px solid #8a8886;
  border-radius:2px;
  background:var(--surface);
  color:var(--text);
  font-size:14px;
  transition:border-color var(--transition);
}
.field input::placeholder{color:#a19f9d}
.field input:focus{
  border-color:var(--accent);
  outline:none;
}
.primary-btn{
  width:100%;padding:8px 16px;border-radius:2px;
  background:var(--accent);color:#fff;font-weight:600;
  transition:background var(--transition);
}
.primary-btn:hover{background:var(--accent-hover)}
.primary-btn:active{background:#005a9e}
.primary-btn:disabled{background:#c8c6c4;color:#fff;cursor:not-allowed}
.helper{color:var(--muted);font-size:12px}
.feedback{min-height:18px;color:var(--red);font-size:13px}
.feedback.success{color:var(--green)}

/* ── Main Page (Logged-in Dashboard) ──────── */
#main-page{display:none}
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 24px;min-height:48px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:sticky;top:0;z-index:10;
}
.header h1{font-size:16px;font-weight:600;color:var(--text)}
.header-sub{color:var(--muted);font-size:12px;margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.username{font-weight:600;color:var(--text);font-size:13px}
.action-btn{
  padding:6px 12px;border-radius:2px;font-size:13px;font-weight:500;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  transition:all var(--transition);
}
.action-btn:hover{border-color:#8a8886;background:#faf9f8}
.action-btn.primary{
  border-color:var(--accent);background:var(--accent);color:#fff;
}
.action-btn.primary:hover{background:var(--accent-hover)}
.action-btn:disabled{opacity:.4;cursor:not-allowed}

.container{max-width:1280px;margin:0 auto;padding:16px 24px}

.section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.section-header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--surface);
}
.section-header h2{font-size:14px;font-weight:600;color:var(--text)}
.section-summary{font-size:12px;color:var(--muted)}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  padding:8px 16px;text-align:left;font-weight:600;
  color:var(--muted);font-size:12px;
  background:var(--surface2);border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody td{
  padding:8px 16px;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--text);vertical-align:middle;
}
tbody tr{transition:background var(--transition)}
tbody tr:hover{background:#f3f2f1}
tbody tr:last-child td{border-bottom:none}

.status-online{color:var(--green)}
.status-offline{color:#a19f9d}
.status-running{color:var(--green);font-weight:500}
.status-stopped{color:var(--muted)}
.gpu-zero{color:var(--red);font-weight:600}

.btn-primary{
  padding:4px 12px;background:var(--accent);color:#fff;
  border-radius:2px;font-size:12px;font-weight:500;
  transition:background var(--transition);display:inline-block;
}
.btn-primary:hover{background:var(--accent-hover)}
.btn-primary.disabled,.btn-primary[disabled]{background:#c8c6c4;color:#fff;cursor:not-allowed}

.expand-row{display:none}
.expand-row.visible{display:table-row}
.expand-row td{padding:8px 16px 8px 40px;background:var(--surface2)}
.gpu-grid{display:flex;flex-wrap:wrap;gap:6px}
.gpu-chip{
  padding:3px 10px;border-radius:2px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:var(--surface);
}
.gpu-chip.used{background:var(--red-bg);border-color:#f1bbbc;color:var(--red)}
.gpu-chip.free{background:var(--green-bg);border-color:#9ad29a;color:var(--green)}

.ssh-cell,.pwd-cell{display:flex;align-items:center;gap:6px}
.ssh-cmd{
  font-family:'SF Mono',Consolas,monospace;font-size:12px;
  background:var(--surface2);padding:2px 8px;border-radius:2px;
  color:var(--text);white-space:nowrap;
  border:1px solid var(--border);
}
.copy-btn{
  padding:2px 8px;font-size:11px;background:none;
  border:1px solid var(--border);border-radius:2px;
  color:var(--muted);transition:all var(--transition);
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.pwd-toggle{
  background:none;border:none;font-size:14px;
  color:var(--muted);cursor:pointer;padding:0 4px;
}
.pwd-toggle:hover{color:var(--accent)}

.empty-state{
  text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;
}
.clickable-row{cursor:pointer}
.clickable-row td:first-child::before{
  content:"▶";margin-right:8px;font-size:9px;color:var(--muted);
  transition:transform .15s;display:inline-block;
}
.clickable-row.expanded td:first-child::before{transform:rotate(90deg)}

.toast{
  position:fixed;left:50%;bottom:30px;
  transform:translateX(-50%) translateY(20px);
  background:#323130;
  color:#fff;padding:8px 16px;
  border-radius:2px;font-size:13px;
  opacity:0;pointer-events:none;
  transition:opacity .2s ease,transform .2s ease;
  box-shadow:var(--shadow);
  z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.boot-overlay{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;z-index:1000;
  transition:opacity .2s ease;
}
.boot-overlay.hidden{opacity:0;pointer-events:none}
.boot-spinner{
  width:24px;height:24px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:boot-spin .8s linear infinite;
}
.boot-text{color:var(--muted);font-size:13px}
@keyframes boot-spin{to{transform:rotate(360deg)}}

@media(max-width:960px){
  .auth-shell{grid-template-columns:1fr}
  .auth-side{border-right:none;border-bottom:1px solid var(--border)}
  .node-list{max-height:220px}
}
@media(max-width:720px){
  .header,.section-header,.selected-node-box{
    flex-direction:column;align-items:flex-start;
  }
  .header-right{justify-content:flex-start}
  .container{padding:16px}
  .auth-side,.auth-main{padding:24px 20px}
}
</style>
</head>
<body>

<div id="boot-overlay" class="boot-overlay" aria-live="polite">
    <div class="boot-spinner" aria-hidden="true"></div>
    <div class="boot-text">正在加载集群管理界面...</div>
</div>

<div id="auth-page">
    <div class="auth-shell">
        <div class="auth-side">
            <h1>GPU 集群管理</h1>
            <p class="subtitle">选择目标服务器，注册或登录后即可进入管理。</p>
            <div class="section-label">
                <h2>可用服务器</h2>
                <span class="tip" id="node-summary">加载中...</span>
            </div>
            <div class="node-list" id="auth-node-list"></div>
        </div>

        <div class="auth-main">
            <div class="tabs">
                <button id="login-tab" class="tab active" type="button">登录</button>
                <button id="register-tab" class="tab" type="button">注册</button>
            </div>

            <div class="selected-node-box hidden">
                <div class="selected-node-text">
                    <strong id="selected-node-name">尚未选择服务器</strong>
                    <div id="selected-node-meta">请先在左侧选中一个可用节点</div>
                </div>
                <span class="tag primary" id="selected-node-tag">未选择</span>
            </div>

            <form id="login-form" class="stack">
                <div class="field">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="field">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button class="primary-btn" id="login-btn" type="submit">登录</button>
                <div class="feedback" id="login-feedback"></div>
            </form>

            <form id="register-form" class="stack hidden">
                <div class="field">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" minlength="3" placeholder="仅支持字母、数字和下划线" autocomplete="username">
                </div>
                <div class="field">
                    <label for="register-email">邮箱</label>
                    <input type="email" id="register-email" placeholder="请输入邮箱" autocomplete="email">
                </div>
                <div class="field">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" minlength="6" placeholder="至少 6 位" autocomplete="new-password">
                </div>
                <button class="primary-btn" id="register-btn" type="submit">注册并登录</button>
                <div class="feedback" id="register-feedback"></div>
            </form>
        </div>
    </div>
</div>

<div id="main-page">
    <div class="header">
        <div>
            <h1>GPU 集群管理</h1>
            <div class="header-sub">集群总览与实例快照</div>
        </div>
        <div class="header-right">
            <span id="header-user" class="muted">用户：-</span>
            <button class="action-btn" id="logout-btn" type="button">退出</button>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <div class="section-header">
                <h2>集群总览</h2>
                <span class="section-summary" id="cluster-summary">加载中...</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>节点名称</th>
                            <th>状态</th>
                            <th>GPU 空闲/总数</th>
                            <th>GPU 型号</th>
                            <th>运行实例数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="cluster-tbody">
                        <tr><td colspan="6" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2>我的实例</h2>
                <span class="section-summary" id="instance-summary">加载中...</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>节点</th>
                            <th>实例名</th>
                            <th>GPU 数</th>
                            <th>内存</th>
                            <th>镜像</th>
                            <th>状态</th>
                            <th>SSH 连接</th>
                            <th>密码</th>
                            <th>到期时间</th>
                        </tr>
                    </thead>
                    <tbody id="instance-tbody">
                        <tr><td colspan="9" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = "";
const STORAGE = {
    token: "cluster_token",
    user: "cluster_user",
    nodeId: "cluster_node_id",
    nodeName: "cluster_node_name",
    entryUrl: "cluster_entry_url"
};

const state = {
    token: localStorage.getItem(STORAGE.token) || "",
    user: safeParse(localStorage.getItem(STORAGE.user)),
    currentNodeId: localStorage.getItem(STORAGE.nodeId) || "",
    currentNodeName: localStorage.getItem(STORAGE.nodeName) || "",
    currentEntryUrl: localStorage.getItem(STORAGE.entryUrl) || "",
    selectedAuthNodeId: localStorage.getItem(STORAGE.nodeId) || "",
    authNodes: [],
    refreshTimer: null
};

const els = {
    authPage: document.getElementById("auth-page"),
    mainPage: document.getElementById("main-page"),
    loginTab: document.getElementById("login-tab"),
    registerTab: document.getElementById("register-tab"),
    loginForm: document.getElementById("login-form"),
    registerForm: document.getElementById("register-form"),
    loginBtn: document.getElementById("login-btn"),
    registerBtn: document.getElementById("register-btn"),
    loginFeedback: document.getElementById("login-feedback"),
    registerFeedback: document.getElementById("register-feedback"),
    authNodeList: document.getElementById("auth-node-list"),
    nodeSummary: document.getElementById("node-summary"),
    selectedNodeName: document.getElementById("selected-node-name"),
    selectedNodeMeta: document.getElementById("selected-node-meta"),
    selectedNodeTag: document.getElementById("selected-node-tag"),
    headerUser: document.getElementById("header-user"),
    logoutBtn: document.getElementById("logout-btn"),
    clusterSummary: document.getElementById("cluster-summary"),
    clusterTbody: document.getElementById("cluster-tbody"),
    instanceSummary: document.getElementById("instance-summary"),
    instanceTbody: document.getElementById("instance-tbody"),
    bootOverlay: document.getElementById("boot-overlay"),
    toast: document.getElementById("toast")
};

function hideBootOverlay() {
    if (!els.bootOverlay) return;
    els.bootOverlay.classList.add("hidden");
    window.setTimeout(function() {
        if (els.bootOverlay) {
            els.bootOverlay.style.display = "none";
        }
    }, 220);
}

function safeParse(value) {
    if (!value) return null;
    try { return JSON.parse(value); } catch (error) { return null; }
}

function setFeedback(target, message, success) {
    target.textContent = message || "";
    target.classList.toggle("success", Boolean(success));
}

function showToast(message) {
    els.toast.textContent = message;
    els.toast.classList.add("show");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(function() {
        els.toast.classList.remove("show");
    }, 2200);
}

function escHtml(value) {
    const div = document.createElement("div");
    div.appendChild(document.createTextNode(String(value == null ? "" : value)));
    return div.innerHTML;
}

function escJs(value) {
    return String(value == null ? "" : value)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\"/g, '\\"');
}

async function copyText(text, btn) {
    if (!text) return;

    function markCopied() {
        if (!btn) return;
        const original = btn.textContent;
        btn.textContent = "✓";
        window.setTimeout(function() { btn.textContent = original; }, 1500);
    }

    if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        try { await navigator.clipboard.writeText(text); markCopied(); return; } catch (error) {}
    }

    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "readonly");
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    textarea.style.pointerEvents = "none";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    let copied = false;
    try { copied = document.execCommand("copy"); } finally { document.body.removeChild(textarea); }
    if (!copied) throw new Error("复制失败");
    markCopied();
}

function authHeaders() {
    return state.token ? { Authorization: "Bearer " + state.token } : {};
}

async function requestJson(path, options) {
    const requestOptions = options || {};
    const headers = Object.assign({}, requestOptions.headers || {});
    if (state.token && !headers.Authorization) {
        headers.Authorization = "Bearer " + state.token;
    }
    if (requestOptions.body && !headers["Content-Type"]) {
        headers["Content-Type"] = "application/json";
    }

    const response = await fetch(API + path, Object.assign({}, requestOptions, { headers: headers }));
    const contentType = response.headers.get("content-type") || "";
    const data = contentType.indexOf("application/json") >= 0
        ? await response.json()
        : await response.text();

    if (!response.ok) {
        const detail = typeof data === "string"
            ? data
            : (data && (data.detail || data.message)) || "请求失败";
        throw new Error(detail);
    }

    return data;
}

function persistSession() {
    localStorage.setItem(STORAGE.token, state.token || "");
    localStorage.setItem(STORAGE.user, JSON.stringify(state.user || null));
    localStorage.setItem(STORAGE.nodeId, state.currentNodeId || "");
    localStorage.setItem(STORAGE.nodeName, state.currentNodeName || "");
    localStorage.setItem(STORAGE.entryUrl, state.currentEntryUrl || "");
}

function clearSession() {
    state.token = "";
    state.user = null;
    state.currentNodeId = "";
    state.currentNodeName = "";
    state.currentEntryUrl = "";
    localStorage.removeItem(STORAGE.token);
    localStorage.removeItem(STORAGE.user);
    localStorage.removeItem(STORAGE.nodeId);
    localStorage.removeItem(STORAGE.nodeName);
    localStorage.removeItem(STORAGE.entryUrl);
}

function switchTab(mode) {
    const isLogin = mode === "login";
    els.loginTab.classList.toggle("active", isLogin);
    els.registerTab.classList.toggle("active", !isLogin);
    els.loginForm.classList.toggle("hidden", !isLogin);
    els.registerForm.classList.toggle("hidden", isLogin);
    setFeedback(els.loginFeedback, "", false);
    setFeedback(els.registerFeedback, "", false);
}

function getSelectedNode() {
    for (let i = 0; i < state.authNodes.length; i += 1) {
        if (state.authNodes[i].node_id === state.selectedAuthNodeId) {
            return state.authNodes[i];
        }
    }
    return null;
}

function updateSelectedNodeBox() {
    const node = getSelectedNode();
    if (!node) {
        els.selectedNodeName.textContent = "尚未选择服务器";
        els.selectedNodeMeta.textContent = "请先在左侧选中一个可用节点";
        els.selectedNodeTag.textContent = "未选择";
        els.selectedNodeTag.classList.add("primary");
        return;
    }

    els.selectedNodeName.textContent = node.name || node.node_id;
    els.selectedNodeMeta.textContent = node.online
        ? (node.allow_register ? "在线 · 可注册新账号" : "在线 · 仅支持已有账号登录")
        : "当前离线";
    els.selectedNodeTag.textContent = node.online ? "在线" : "离线";
    els.selectedNodeTag.classList.toggle("primary", Boolean(node.online));
}

function selectNode(nodeId) {
    state.selectedAuthNodeId = nodeId;
    localStorage.setItem(STORAGE.nodeId, nodeId);
    renderAuthNodes();
    updateSelectedNodeBox();
}

function renderAuthNodes() {
    if (!state.authNodes.length) {
        els.authNodeList.innerHTML = '<div class="empty-state" style="padding:24px 12px;">暂无可用节点</div>';
        els.nodeSummary.textContent = "0 个节点";
        updateSelectedNodeBox();
        return;
    }

    let onlineCount = 0;
    let html = "";
    state.authNodes.forEach(function(node) {
        if (node.online) onlineCount += 1;
        const selected = node.node_id === state.selectedAuthNodeId;
        const classNames = ["node-card"];
        if (selected) classNames.push("selected");
        if (!node.online) classNames.push("offline");
        html += '<button type="button" class="' + classNames.join(" ") + '" data-node-id="' + escHtml(node.node_id) + '">';
        html += '<div class="node-card-header">';
        html += '<div><div class="node-name">' + escHtml(node.name || node.node_id) + '</div>';
        html += '<div class="node-meta">' + escHtml(node.node_id) + '</div></div>';
        html += '<span class="node-status"><span class="dot ' + (node.online ? 'online' : 'offline') + '"></span>' + (node.online ? '在线' : '离线') + '</span>';
        html += '</div>';
        html += '<div class="node-tags">';
        html += '<span class="tag">' + (node.allow_register ? '可注册' : '仅登录') + '</span>';
        if (selected) html += '<span class="tag primary">当前选择</span>';
        html += '</div>';
        html += '</button>';
    });
    els.authNodeList.innerHTML = html;
    els.nodeSummary.textContent = state.authNodes.length + ' 个节点，在线 ' + onlineCount + ' 个';

    Array.prototype.forEach.call(els.authNodeList.querySelectorAll("button[data-node-id]"), function(button) {
        button.addEventListener("click", function() {
            selectNode(button.getAttribute("data-node-id"));
        });
    });

    updateSelectedNodeBox();
}

function renderHeader() {
    const username = state.user && state.user.username ? state.user.username : "-";
    els.headerUser.textContent = "用户：" + username;
}

function showLogin() {
    els.authPage.style.display = "flex";
    els.mainPage.style.display = "none";
}

function showMain() {
    els.authPage.style.display = "none";
    els.mainPage.style.display = "block";
    renderHeader();
}

function logout() {
    clearSession();
    if (state.refreshTimer) {
        clearInterval(state.refreshTimer);
        state.refreshTimer = null;
    }
    renderAuthNodes();
    showLogin();
}

async function loadAuthNodes() {
    try {
        const data = await requestJson("/api/auth/nodes", { headers: {} });
        state.authNodes = Array.isArray(data.nodes) ? data.nodes : [];
        if (!state.selectedAuthNodeId && state.authNodes.length) {
            state.selectedAuthNodeId = state.authNodes[0].node_id;
        }
        const selectedStillExists = state.authNodes.some(function(node) {
            return node.node_id === state.selectedAuthNodeId;
        });
        if (!selectedStillExists && state.authNodes.length) {
            state.selectedAuthNodeId = state.authNodes[0].node_id;
        }
        renderAuthNodes();
    } catch (error) {
        els.authNodeList.innerHTML = '<div class="empty-state" style="padding:24px 12px;">节点列表加载失败</div>';
        els.nodeSummary.textContent = "加载失败";
        updateSelectedNodeBox();
    }
}

function requireSelectedNode(mode) {
    const node = getSelectedNode();
    if (!node) throw new Error("请先选择服务器");
    return node;
}

function applyAuthResult(data) {
    state.token = data.access_token || "";
    state.user = data.user || { username: data.username || "", is_admin: Boolean(data.is_admin) };
    state.currentNodeId = data.node_id || state.selectedAuthNodeId || "";
    state.currentNodeName = data.node_name || (getSelectedNode() ? getSelectedNode().name : "");
    state.currentEntryUrl = data.entry_url || "";
    persistSession();
    renderAuthNodes();
    renderHeader();
}

function buildEntryUrl(webUrl) {
    if (!webUrl) return "";
    const separator = webUrl.indexOf("?") >= 0 ? "&" : "?";
    return webUrl + separator + "token=" + encodeURIComponent(state.token);
}

function openCurrentServer() {
    if (!state.currentEntryUrl) {
        showToast("当前服务器直达地址不可用");
        return;
    }
    window.open(state.currentEntryUrl, "_blank", "noopener");
}

async function doLogin(event) {
    event.preventDefault();
    setFeedback(els.loginFeedback, "", false);
    let node;
    try { node = requireSelectedNode("login"); } catch (error) {
        setFeedback(els.loginFeedback, error.message, false);
        return;
    }

    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;
    if (!username || !password) {
        setFeedback(els.loginFeedback, "请填写用户名和密码", false);
        return;
    }

    els.loginBtn.disabled = true;
    els.loginBtn.textContent = "登录中...";
    try {
        const data = await requestJson("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({ node_id: node.node_id, username: username, password: password })
        });
        applyAuthResult(data);
        showMain();
        await loadAll();
        showToast("已登录 " + (data.node_name || node.name));
    } catch (error) {
        setFeedback(els.loginFeedback, error.message || "登录失败", false);
    } finally {
        els.loginBtn.disabled = false;
        els.loginBtn.textContent = "登录";
    }
}

async function doRegister(event) {
    event.preventDefault();
    setFeedback(els.registerFeedback, "", false);
    let node;
    try { node = requireSelectedNode("register"); } catch (error) {
        setFeedback(els.registerFeedback, error.message, false);
        return;
    }

    const username = document.getElementById("register-username").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    if (!username || !email || !password) {
        setFeedback(els.registerFeedback, "请填写完整注册信息", false);
        return;
    }

    els.registerBtn.disabled = true;
    els.registerBtn.textContent = "注册中...";
    try {
        const data = await requestJson("/api/auth/register", {
            method: "POST",
            body: JSON.stringify({ node_id: node.node_id, username: username, email: email, password: password })
        });
        applyAuthResult(data);
        showMain();
        await loadAll();
        setFeedback(els.registerFeedback, data.message || "注册成功", true);
        showToast(data.message || "注册成功");
    } catch (error) {
        setFeedback(els.registerFeedback, error.message || "注册失败", false);
    } finally {
        els.registerBtn.disabled = false;
        els.registerBtn.textContent = "注册并登录";
    }
}

async function loadAll() {
    await Promise.all([loadCluster(), loadMyInstances()]);
    updateTime();
    if (state.refreshTimer) clearInterval(state.refreshTimer);
    state.refreshTimer = setInterval(function() {
        loadAll().catch(function() {});
    }, 30000);
}

function updateTime() {
    // no-op after removing top-right timestamp block
}

async function loadCluster() {
    try {
        const data = await requestJson("/api/cluster/status", { headers: authHeaders() });
        renderCluster(data);
    } catch (error) {
        console.error("集群状态加载失败", error);
    }
}

function renderCluster(data) {
    const summary = data && data.summary ? data.summary : { total_gpu: 0, free_gpu: 0, total_instances: 0 };
    els.clusterSummary.textContent = "GPU " + summary.total_gpu + " 张 · 空闲 " + summary.free_gpu + " 张 · 实例 " + summary.total_instances + " 个";

    const nodes = Array.isArray(data && data.nodes) ? data.nodes : [];
    if (!nodes.length) {
        els.clusterTbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无节点数据</td></tr>';
        return;
    }

    let html = "";
    nodes.forEach(function(node) {
        const statusCls = node.online ? "status-online" : "status-offline";
        const statusTxt = node.online ? "● 在线" : "○ 离线";
        const gpuCls = node.online && Number(node.gpu_free) === 0 ? "gpu-zero" : "";
        const entryUrl = buildEntryUrl(node.web_url || "");
        const isCurrent = state.currentNodeId && state.currentNodeId === node.node_id;

        html += '<tr class="clickable-row' + (isCurrent ? ' expanded' : '') + '" data-node="' + escHtml(node.node_id) + '">';
        html += '<td>' + escHtml(node.name || node.node_id) + '</td>';
        html += '<td class="' + statusCls + '">' + statusTxt + '</td>';
        html += '<td class="' + gpuCls + '">' + escHtml(String(node.gpu_free)) + '/' + escHtml(String(node.gpu_total)) + '</td>';
        html += '<td>' + escHtml(node.gpu_model || '—') + '</td>';
        html += '<td>' + escHtml(String(node.instance_count || 0)) + '</td>';
        html += '<td>';
        if (entryUrl) {
            html += '<a class="btn-primary" href="' + escHtml(entryUrl) + '" target="_blank" onclick="event.stopPropagation()">进入管理</a>';
        } else {
            html += '<span style="color:var(--muted)">—</span>';
        }
        html += '</td></tr>';

        html += '<tr class="expand-row' + (isCurrent ? ' visible' : '') + '" data-expand="' + escHtml(node.node_id) + '"><td colspan="6">';
        if (node.gpus && node.gpus.length > 0) {
            html += '<div class="gpu-grid">';
            node.gpus.forEach(function(gpu) {
                const cls = gpu.status === 'free' ? 'free' : 'used';
                const label = 'GPU ' + gpu.index + ': ' + (gpu.status === 'free' ? '空闲' : (gpu.allocated_to || '占用中'));
                html += '<span class="gpu-chip ' + cls + '">' + escHtml(label) + '</span>';
            });
            html += '</div>';
        } else {
            html += '<span style="color:var(--muted)">无 GPU 详情数据</span>';
        }
        html += '</td></tr>';
    });
    els.clusterTbody.innerHTML = html;

    Array.prototype.forEach.call(els.clusterTbody.querySelectorAll("tr.clickable-row"), function(row) {
        row.addEventListener("click", function() { toggleExpand(row); });
    });
}

function toggleExpand(row) {
    const nodeId = row.getAttribute("data-node");
    const expandRow = document.querySelector('tr[data-expand="' + nodeId + '"]');
    if (!expandRow) return;
    const visible = expandRow.classList.contains("visible");
    expandRow.classList.toggle("visible", !visible);
    row.classList.toggle("expanded", !visible);
}

async function loadMyInstances() {
    try {
        const data = await requestJson("/api/cluster/my_instances", { headers: authHeaders() });
        renderInstances(data);
    } catch (error) {
        if (error && error.message && error.message.indexOf("token") >= 0) { logout(); return; }
        console.error("实例加载失败", error);
    }
}

function formatExpire(value) {
    if (!value) return "不限";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return String(value);
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const mi = String(date.getMinutes()).padStart(2, "0");
    return yyyy + "-" + mm + "-" + dd + " " + hh + ":" + mi;
}

function renderInstances(data) {
    const instances = Array.isArray(data && data.instances) ? data.instances : [];
    const running = instances.filter(function(instance) { return instance.status === "running"; });
    els.instanceSummary.textContent = "共 " + running.length + " 个运行中";

    if (!instances.length) {
        els.instanceTbody.innerHTML = '<tr><td colspan="9" class="empty-state">暂无运行中的实例</td></tr>';
        return;
    }

    let html = "";
    instances.forEach(function(instance, index) {
        const stCls = instance.status === "running" ? "status-running" : "status-stopped";
        const stTxt = instance.status === "running" ? "运行中" : "已停止";
        const sshCmd = instance.vps_access && instance.vps_access.ssh_cmd
            ? instance.vps_access.ssh_cmd
            : (instance.ssh_command || instance.ssh_cmd || "—");
        const gpuCount = Array.isArray(instance.gpu_indices) ? instance.gpu_indices.length : Number(instance.gpu_count || 0);
        const memoryGb = instance.memory_gb != null ? instance.memory_gb + "G" : (instance.memory || "—");
        const image = instance.image_name || instance.image || "—";
        const name = instance.container_name || instance.name || instance.instance_name || "—";
        const pwd = instance.ssh_password || instance.password || "";
        const pwdId = "pwd-" + index;

        html += "<tr>";
        html += "<td>" + escHtml(instance.node_name || instance.node_id || "—") + "</td>";
        html += "<td>" + escHtml(name) + "</td>";
        html += "<td>" + escHtml(String(gpuCount)) + "</td>";
        html += "<td>" + escHtml(String(memoryGb)) + "</td>";
        html += "<td>" + escHtml(image) + "</td>";
        html += "<td class=\"" + stCls + "\">" + stTxt + "</td>";
        html += "<td>";
        if (sshCmd !== "—") {
            html += '<div class="ssh-cell">';
            html += '<span class="ssh-cmd">' + escHtml(sshCmd) + '</span>';
            html += '<button class="copy-btn" onclick="copyText(\'' + escJs(sshCmd) + '\', this)">📋</button>';
            html += '</div>';
        } else {
            html += '—';
        }
        html += "</td>";
        html += "<td>";
        if (pwd) {
            html += '<div class="pwd-cell">';
            html += '<span id="' + pwdId + '">****</span>';
            html += "<button class=\"pwd-toggle\" onclick=\"togglePwd('" + pwdId + "', '" + escJs(pwd) + "')\">👁</button>";
            html += '</div>';
        } else {
            html += '—';
        }
        html += "</td>";
        html += "<td>" + escHtml(formatExpire(instance.expire_at || instance.expires_at || instance.expire_time || "")) + "</td>";
        html += "</tr>";
    });

    els.instanceTbody.innerHTML = html;
}

function togglePwd(id, realPwd) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = el.textContent === "****" ? realPwd : "****";
}

window.copyText = copyText;
window.togglePwd = togglePwd;

els.loginTab.addEventListener("click", function() { switchTab("login"); });
els.registerTab.addEventListener("click", function() { switchTab("register"); });
els.loginForm.addEventListener("submit", doLogin);
els.registerForm.addEventListener("submit", doRegister);
els.logoutBtn.addEventListener("click", logout);

document.getElementById("login-password").addEventListener("keydown", function(event) {
    if (event.key === "Enter") doLogin(event);
});
document.getElementById("login-username").addEventListener("keydown", function(event) {
    if (event.key === "Enter") document.getElementById("login-password").focus();
});

(async function init() {
    try {
        await loadAuthNodes();
        if (state.token && state.user) {
            showMain();
            renderHeader();
            try { await loadAll(); } catch (error) { logout(); }
        } else {
            showLogin();
        }
    } finally {
        hideBootOverlay();
    }
})();
</script>
</body>
</html>
